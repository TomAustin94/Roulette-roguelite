<svg xmlns="http://www.w3.org/2000/svg" width="432" height="768" viewBox="0 0 432 768" style="background:#0D120D">
<!-- GAME OVER SCREEN — full run end. Shows LOSS state (WIN state annotated separately).
     Issue #5: After losing, player sees run stats + "START NEW RUN" primary CTA -->
<defs>
<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
<path d="M40,0 L0,0 0,40" fill="none" stroke="#ffffff06" stroke-width="0.5"/>
</pattern>
<radialGradient id="lossAura" cx="50%" cy="35%" r="55%">
<stop offset="0%" stop-color="#3A060620"/>
<stop offset="100%" stop-color="transparent"/>
</radialGradient>
</defs>
<rect width="432" height="768" fill="url(#grid)"/>
<rect width="432" height="768" fill="url(#lossAura)"/>
<rect x="0" y="0" width="432" height="3" fill="#9E1010"/>

<!-- Corner ornaments (red tinted for loss state) -->
<path d="M 16,10 L 60,10 M 16,10 L 16,38" stroke="#9E1010" stroke-width="1" opacity="0.6" fill="none"/>
<circle cx="16" cy="10" r="2" fill="#9E101070"/>
<path d="M 416,10 L 372,10 M 416,10 L 416,38" stroke="#9E1010" stroke-width="1" opacity="0.6" fill="none"/>
<circle cx="416" cy="10" r="2" fill="#9E101070"/>

<!-- ===== LOSS HEADER ===== -->
<rect x="0" y="3" width="432" height="10" fill="#1A0808"/>

<!-- Doom diamond -->
<path d="M 216,22 L 230,36 L 216,50 L 202,36 Z" fill="#9E1010"/>
<path d="M 216,26 L 226,36 L 216,46 L 206,36 Z" fill="#1A0808"/>

<text x="216" y="82" font-family="Georgia,serif" font-size="40" font-weight="bold" fill="#CC2020" text-anchor="middle" letter-spacing="4">THE HOUSE</text>
<text x="216" y="118" font-family="Georgia,serif" font-size="40" font-weight="bold" fill="#CC2020" text-anchor="middle" letter-spacing="9">WINS.</text>

<!-- Separator -->
<line x1="60" y1="132" x2="182" y2="132" stroke="#9E101040" stroke-width="1"/>
<path d="M 216,125 L 224,132 L 216,139 L 208,132 Z" fill="#9E1010" opacity="0.8"/>
<line x1="250" y1="132" x2="372" y2="132" stroke="#9E101040" stroke-width="1"/>

<!-- Flavour text -->
<text x="216" y="156" font-family="Georgia,serif" font-size="13" fill="#9E5050" text-anchor="middle" font-style="italic">"You came close. But close doesn't</text>
<text x="216" y="174" font-family="Georgia,serif" font-size="13" fill="#9E5050" text-anchor="middle" font-style="italic">buy back a soul."</text>

<!-- ===== DEALER (SMUG, centered, medium size) ===== -->
<rect x="0" y="186" width="432" height="196" fill="#0A0A0A"/>

<!-- Atmospheric floor reflection -->
<ellipse cx="216" cy="380" rx="100" ry="8" fill="#9E101010"/>

<!-- Dealer body -->
<rect x="168" y="300" width="96" height="100" rx="10" fill="#1C0B32"/>
<polygon points="216,308 195,336 216,348 237,336" fill="#F0EAD8" opacity="0.9"/>
<polygon points="210,332 216,340 222,332 216,324" fill="#9E1010"/>
<circle cx="216" cy="358" r="2" fill="#E6BF3340"/>
<circle cx="216" cy="372" r="2" fill="#E6BF3340"/>

<!-- Arms (confident, slightly open) -->
<path d="M 168,318 Q 136,334 130,368" stroke="#1C0B32" stroke-width="30" fill="none" stroke-linecap="round"/>
<path d="M 264,318 Q 296,334 302,368" stroke="#1C0B32" stroke-width="30" fill="none" stroke-linecap="round"/>
<ellipse cx="132" cy="373" rx="14" ry="12" fill="#C49060"/>
<ellipse cx="300" cy="373" rx="14" ry="12" fill="#C49060"/>

<!-- Head -->
<ellipse cx="216" cy="264" rx="40" ry="44" fill="#C49060"/>
<!-- Hair -->
<path d="M 176,252 Q 180,222 216,218 Q 252,222 256,252 Q 248,236 216,232 Q 184,236 176,252 Z" fill="#1E1008"/>
<rect x="176" y="251" width="9" height="28" rx="3" fill="#1E1008"/>
<rect x="247" y="251" width="9" height="28" rx="3" fill="#1E1008"/>
<!-- Green visor -->
<path d="M 178,249 Q 216,236 254,249 L 256,265 Q 216,250 176,265 Z" fill="#2A8B2A"/>
<path d="M 179,263 Q 216,252 253,263 L 253,269 Q 216,258 179,269 Z" fill="#1E6B1E"/>

<!-- Eyes: SMUG (wide grin energy, one brow arched high) -->
<ellipse cx="204" cy="278" rx="5.5" ry="4.5" fill="#1A1014"/>
<ellipse cx="228" cy="278" rx="5.5" ry="5.5" fill="#1A1014"/>
<ellipse cx="230" cy="276" rx="2" ry="1.5" fill="#FFFFFF40"/>
<!-- Left brow: ARCHED (smug) -->
<path d="M 197,268 Q 204,261 211,267" stroke="#1E1008" stroke-width="2.8" fill="none" stroke-linecap="round"/>
<!-- Right brow: raised neutral -->
<path d="M 222,268 Q 228,264 234,268" stroke="#1E1008" stroke-width="2.8" fill="none" stroke-linecap="round"/>
<!-- Wide grin -->
<path d="M 202,293 Q 216,307 230,293" stroke="#7A4A3A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
<!-- Teeth suggestion -->
<rect x="207" y="295" width="18" height="6" rx="2" fill="#F0E8E0" opacity="0.6"/>

<!-- Speech bubble -->
<polygon points="248,248 263,240 263,256" fill="#F5F0E4"/>
<rect x="264" y="198" width="156" height="86" rx="10" fill="#F5F0E4"/>
<rect x="266" y="200" width="152" height="82" rx="9" fill="none" stroke="#D4C8A0" stroke-width="0.8"/>
<text x="342" y="222" font-family="Georgia,serif" font-size="11.5" fill="#2A1C10" text-anchor="middle" font-style="italic">"Ha."</text>
<text x="342" y="242" font-family="Georgia,serif" font-size="11.5" fill="#2A1C10" text-anchor="middle" font-style="italic">"Mine."</text>
<text x="342" y="262" font-family="Georgia,serif" font-size="11.5" fill="#2A1C10" text-anchor="middle" font-style="italic">"Come now,</text>
<text x="342" y="277" font-family="Georgia,serif" font-size="11.5" fill="#2A1C10" text-anchor="middle" font-style="italic">keep trying."</text>

<!-- ===== RUN STATS CARD ===== -->
<rect x="16" y="392" width="400" height="172" rx="10" fill="#100A0A"/>
<rect x="16" y="392" width="400" height="172" rx="10" fill="none" stroke="#5A1818" stroke-width="1"/>
<rect x="16" y="392" width="400" height="4" rx="0" fill="#9E1010" opacity="0.6"/>

<text x="32" y="414" font-family="sans-serif" font-size="9" fill="#A09878" letter-spacing="3">RUN SUMMARY</text>
<line x1="32" y1="420" x2="400" y2="420" stroke="#5A1818" stroke-width="1"/>

<!-- Stats in 2-column grid -->
<!-- Left column -->
<text x="32" y="440" font-family="sans-serif" font-size="11" fill="#706050">Floors Cleared</text>
<text x="32" y="458" font-family="sans-serif" font-size="11" fill="#706050">Total Spins</text>
<text x="32" y="476" font-family="sans-serif" font-size="11" fill="#706050">Biggest Win</text>
<text x="32" y="494" font-family="sans-serif" font-size="11" fill="#706050">Final Chips</text>
<text x="32" y="512" font-family="sans-serif" font-size="11" fill="#706050">Mods Held</text>
<text x="32" y="530" font-family="sans-serif" font-size="11" fill="#706050">Total Score</text>

<!-- Right column values -->
<text x="204" y="440" font-family="Georgia,serif" font-size="13" fill="#F0E6D0" text-anchor="end">2 of 5</text>
<text x="204" y="458" font-family="Georgia,serif" font-size="13" fill="#F0E6D0" text-anchor="end">34</text>
<text x="204" y="476" font-family="Georgia,serif" font-size="13" fill="#E6BF33" text-anchor="end">♦ 350</text>
<text x="204" y="494" font-family="Georgia,serif" font-size="13" fill="#CC2020" text-anchor="end">♦ 0  (Bust)</text>
<text x="204" y="512" font-family="Georgia,serif" font-size="13" fill="#F0E6D0" text-anchor="end">4</text>
<text x="204" y="530" font-family="Georgia,serif" font-size="15" font-weight="bold" fill="#E6BF33" text-anchor="end">8,240 pts</text>

<!-- Divider between columns -->
<line x1="216" y1="428" x2="216" y2="545" stroke="#5A181840" stroke-width="1"/>

<!-- Right half — floor progress visual -->
<text x="232" y="440" font-family="sans-serif" font-size="9" fill="#706050" letter-spacing="2">PROGRESS</text>

<!-- Floor dots (visual journey) -->
<circle cx="248" cy="464" r="9" fill="#E6BF33"/>
<text x="248" y="468" font-family="sans-serif" font-size="8" fill="#0A0806" text-anchor="middle" font-weight="bold">1</text>
<text x="248" y="480" font-family="sans-serif" font-size="7" fill="#E6BF33" text-anchor="middle">✓</text>

<circle cx="284" cy="464" r="9" fill="#9090A060"/>
<text x="284" y="468" font-family="sans-serif" font-size="8" fill="#F0E6D0" text-anchor="middle">2</text>
<text x="284" y="480" font-family="sans-serif" font-size="7" fill="#9090A0" text-anchor="middle">✓</text>

<circle cx="320" cy="464" r="9" fill="none" stroke="#5A1818" stroke-width="2"/>
<text x="320" y="468" font-family="sans-serif" font-size="8" fill="#9E3030" text-anchor="middle">3</text>
<text x="320" y="480" font-family="sans-serif" font-size="7" fill="#9E3030" text-anchor="middle">✗</text>

<circle cx="356" cy="464" r="9" fill="none" stroke="#2A1818" stroke-width="1.5" opacity="0.5"/>
<text x="356" y="468" font-family="sans-serif" font-size="8" fill="#4A2A2A" text-anchor="middle">4</text>

<circle cx="392" cy="464" r="9" fill="none" stroke="#1A0808" stroke-width="1.5" opacity="0.4"/>
<text x="392" y="468" font-family="sans-serif" font-size="8" fill="#3A1818" text-anchor="middle">5</text>

<!-- Connector lines between floor dots -->
<line x1="257" y1="464" x2="275" y2="464" stroke="#7A706040" stroke-width="1.5"/>
<line x1="293" y1="464" x2="311" y2="464" stroke="#5A181840" stroke-width="1.5"/>
<line x1="329" y1="464" x2="347" y2="464" stroke="#2A181840" stroke-width="1"/>
<line x1="365" y1="464" x2="383" y2="464" stroke="#1A080840" stroke-width="1"/>

<!-- Best score context -->
<text x="232" y="504" font-family="sans-serif" font-size="10" fill="#706050">Best score:</text>
<text x="400" y="504" font-family="Georgia,serif" font-size="11" fill="#E6BF33" text-anchor="end">24,580 pts</text>
<text x="232" y="520" font-family="sans-serif" font-size="10" fill="#706050">This run:</text>
<text x="400" y="520" font-family="Georgia,serif" font-size="11" fill="#9E5050" text-anchor="end">8,240 pts</text>
<text x="232" y="537" font-family="sans-serif" font-size="9" fill="#504030">Not a new record.</text>

<!-- ===== CTA BUTTONS ===== -->

<!-- START NEW RUN — primary gold -->
<rect x="16" y="578" width="400" height="62" rx="8" fill="#E6BF33"/>
<rect x="18" y="580" width="396" height="58" rx="7" fill="none" stroke="#F0D86050" stroke-width="1.5"/>
<text x="216" y="617" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="#080604" text-anchor="middle" letter-spacing="4">START NEW RUN</text>

<!-- MAIN MENU — secondary -->
<rect x="16" y="652" width="192" height="48" rx="6" fill="#101A10"/>
<rect x="16" y="652" width="192" height="48" rx="6" fill="none" stroke="#E6BF3330" stroke-width="1"/>
<text x="112" y="680" font-family="Georgia,serif" font-size="15" fill="#A09878" text-anchor="middle">← MAIN MENU</text>

<!-- HIGH SCORES — secondary -->
<rect x="224" y="652" width="192" height="48" rx="6" fill="#101A10"/>
<rect x="224" y="652" width="192" height="48" rx="6" fill="none" stroke="#E6BF3330" stroke-width="1"/>
<text x="320" y="680" font-family="Georgia,serif" font-size="15" fill="#A09878" text-anchor="middle">◇ HIGH SCORES</text>

<!-- Floor lore quote -->
<line x1="40" y1="716" x2="392" y2="716" stroke="#9E101818" stroke-width="1"/>
<text x="216" y="736" font-family="Georgia,serif" font-size="11" fill="#9E4040" text-anchor="middle" font-style="italic">"Someone always wins here. Tonight it isn't you."</text>
<text x="216" y="754" font-family="sans-serif" font-size="9" fill="#40201880" text-anchor="middle">— The Velvet Room</text>

<rect x="0" y="764" width="432" height="4" fill="#9E101828"/>
</svg>

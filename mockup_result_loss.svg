<svg xmlns="http://www.w3.org/2000/svg" width="432" height="768" viewBox="0 0 432 768" style="background:#0D120D">
<!-- RESULT SCREEN: PLAYER LOSES — dealer is smug/mocking -->
<defs>
<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
<path d="M40,0 L0,0 0,40" fill="none" stroke="#ffffff06" stroke-width="0.5"/>
</pattern>
<radialGradient id="lossGlow" cx="50%" cy="40%" r="55%">
<stop offset="0%" stop-color="#3A080810"/>
<stop offset="100%" stop-color="transparent"/>
</radialGradient>
</defs>
<rect width="432" height="768" fill="url(#grid)"/>
<rect width="432" height="768" fill="url(#lossGlow)"/>
<rect x="0" y="0" width="432" height="3" fill="#E6BF33"/>

<!-- ===== HUD ===== -->
<rect x="0" y="3" width="432" height="72" fill="#0A140A"/>
<rect x="0" y="75" width="432" height="1" fill="#E6BF3828"/>
<text x="16" y="22" font-family="sans-serif" font-size="10" fill="#A09878" letter-spacing="2">FLOOR 1 · ROUND 1 · SPIN 4 / 5</text>
<text x="16" y="44" font-family="Georgia,serif" font-size="18" font-weight="bold" fill="#E6BF33">The Velvet Room</text>
<text x="416" y="44" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="#E6BF33" text-anchor="end">♦ 125</text>
<rect x="16" y="58" width="400" height="5" rx="2" fill="#1A2A1A"/>
<rect x="16" y="58" width="156" height="5" rx="2" fill="#9E3A1A"/>
<text x="16" y="71" font-family="sans-serif" font-size="9" fill="#706050">156 / 400 pts</text>

<!-- ===== MISS BANNER ===== -->
<rect x="0" y="76" width="432" height="54" fill="#2A0808"/>
<line x1="0" y1="76" x2="432" y2="76" stroke="#9E1010" stroke-width="2"/>
<line x1="0" y1="130" x2="432" y2="130" stroke="#9E101040" stroke-width="1"/>
<text x="216" y="112" font-family="Georgia,serif" font-size="26" font-weight="bold" fill="#CC2020" text-anchor="middle" letter-spacing="8">MISS</text>
<path d="M 80,103 L 86,109 L 80,115 L 74,109 Z" fill="#9E101060"/>
<path d="M 352,103 L 358,109 L 352,115 L 346,109 Z" fill="#9E101060"/>

<!-- ===== WINNING NUMBER (player did NOT have this) ===== -->
<rect x="124" y="142" width="184" height="120" rx="16" fill="#1A1A1A"/>
<rect x="124" y="142" width="184" height="120" rx="16" fill="none" stroke="#404040" stroke-width="3"/>
<rect x="130" y="148" width="172" height="108" rx="13" fill="none" stroke="#50505050" stroke-width="1"/>
<text x="216" y="200" font-family="Georgia,serif" font-size="72" font-weight="bold" fill="#808080" text-anchor="middle">4</text>
<text x="216" y="248" font-family="Georgia,serif" font-size="16" fill="#606060" text-anchor="middle" letter-spacing="4">BLACK</text>
<!-- Small "not yours" indicator -->
<text x="216" y="138" font-family="sans-serif" font-size="9" fill="#9E1010" text-anchor="middle" letter-spacing="2">— BALL LANDED —</text>

<!-- ===== DEALER (SMUG / MOCKING after player loses) ===== -->
<rect x="0" y="278" width="210" height="222" fill="#0A0A0A"/>

<!-- Dealer body -->
<rect x="40" y="362" width="90" height="110" rx="10" fill="#1C0B32"/>
<polygon points="85,370 68,394 85,406 102,394" fill="#F0EAD8" opacity="0.9"/>
<polygon points="80,391 85,398 90,391 85,384" fill="#9E1010"/>
<!-- Arms (relaxed/confident — leaning back slightly) -->
<path d="M 40,382 Q 16,396 20,440" stroke="#1C0B32" stroke-width="28" fill="none" stroke-linecap="round"/>
<path d="M 130,382 Q 158,394 152,436" stroke="#1C0B32" stroke-width="28" fill="none" stroke-linecap="round"/>
<!-- Hands (relaxed, open) -->
<ellipse cx="22" cy="445" rx="14" ry="12" fill="#C49060"/>
<ellipse cx="150" cy="440" rx="14" ry="12" fill="#C49060"/>
<!-- Head -->
<ellipse cx="85" cy="330" rx="38" ry="42" fill="#C49060"/>
<!-- Hair -->
<path d="M 47,319 Q 51,290 85,286 Q 119,290 123,319 Q 116,304 85,300 Q 54,304 47,319 Z" fill="#1E1008"/>
<rect x="47" y="318" width="9" height="28" rx="3" fill="#1E1008"/>
<rect x="114" y="318" width="9" height="28" rx="3" fill="#1E1008"/>
<!-- Green visor -->
<path d="M 49,316 Q 85,303 121,316 L 123,331 Q 85,317 47,331 Z" fill="#2A8B2A"/>
<path d="M 50,329 Q 85,318 120,329 L 120,335 Q 85,324 50,335 Z" fill="#1E6B1E"/>

<!-- Eyes: SMUG — slightly narrowed, one brow arched -->
<ellipse cx="74" cy="343" rx="5.5" ry="4" fill="#1A1014"/>
<ellipse cx="96" cy="343" rx="5.5" ry="5" fill="#1A1014"/>
<!-- Eye gleam (smug sparkle) -->
<ellipse cx="98" cy="341" rx="2" ry="1.5" fill="#FFFFFF40"/>
<!-- Left brow: arched UP mockingly -->
<path d="M 68,334 Q 74,328 80,334" stroke="#1E1008" stroke-width="2.5" fill="none" stroke-linecap="round"/>
<!-- Right brow: flat/relaxed (confident) -->
<path d="M 90,336 Q 96,333 102,336" stroke="#1E1008" stroke-width="2.5" fill="none" stroke-linecap="round"/>

<!-- Mouth: wide SMIRK (asymmetric, right side higher) -->
<path d="M 76,358 Q 86,368 98,358" stroke="#7A4A3A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
<!-- Smug dimple -->
<circle cx="94" cy="360" r="2" fill="#90503030" opacity="0.5"/>

<!-- Speech bubble (mocking, sarcastic tone) -->
<polygon points="122,315 136,308 136,323" fill="#F5F0E4"/>
<rect x="137" y="280" width="188" height="100" rx="10" fill="#F5F0E4"/>
<rect x="139" y="282" width="184" height="96" rx="9" fill="none" stroke="#D4C8A0" stroke-width="0.8"/>
<text x="231" y="305" font-family="Georgia,serif" font-size="12" fill="#2A1C10" text-anchor="middle" font-style="italic">"Better luck next spin.</text>
<text x="231" y="323" font-family="Georgia,serif" font-size="12" fill="#2A1C10" text-anchor="middle" font-style="italic">The house thanks you</text>
<text x="231" y="341" font-family="Georgia,serif" font-size="12" fill="#2A1C10" text-anchor="middle" font-style="italic">for your generous</text>
<text x="231" y="359" font-family="Georgia,serif" font-size="12" fill="#2A1C10" text-anchor="middle" font-style="italic">donation."</text>
<text x="314" y="373" font-family="Georgia,serif" font-size="10" fill="#A09060" text-anchor="end" font-style="italic">— The Dealer</text>

<!-- ===== LOSS BREAKDOWN CARD ===== -->
<rect x="216" y="278" width="216" height="222" fill="#1A0E0E"/>
<rect x="216" y="278" width="216" height="222" fill="none" stroke="#5A1818" stroke-width="1"/>
<rect x="216" y="278" width="216" height="4" rx="0" fill="#9E101040"/>

<text x="324" y="302" font-family="sans-serif" font-size="10" fill="#A09878" text-anchor="middle" letter-spacing="2">ROUND TOTAL</text>
<line x1="230" y1="308" x2="418" y2="308" stroke="#5A1818" stroke-width="1"/>

<text x="230" y="328" font-family="sans-serif" font-size="11" fill="#706050">Straight 17 (lost)</text>
<text x="418" y="328" font-family="Georgia,serif" font-size="13" fill="#9E3030" text-anchor="end">– ♦ 25</text>
<text x="230" y="348" font-family="sans-serif" font-size="11" fill="#706050">Red Bet (lost)</text>
<text x="418" y="348" font-family="Georgia,serif" font-size="13" fill="#9E3030" text-anchor="end">– ♦ 10</text>
<text x="230" y="368" font-family="sans-serif" font-size="11" fill="#706050">Straight 25 (lost)</text>
<text x="418" y="368" font-family="Georgia,serif" font-size="13" fill="#9E3030" text-anchor="end">– ♦ 25</text>

<line x1="230" y1="380" x2="418" y2="380" stroke="#5A1818" stroke-width="1"/>
<text x="230" y="398" font-family="Georgia,serif" font-size="14" fill="#F0E6D0">Total Lost</text>
<text x="418" y="398" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="#CC2020" text-anchor="end">– ♦ 60</text>

<line x1="230" y1="410" x2="418" y2="410" stroke="#5A181840" stroke-width="1"/>
<text x="230" y="428" font-family="sans-serif" font-size="11" fill="#A09878">Score Gained</text>
<text x="418" y="428" font-family="Georgia,serif" font-size="13" fill="#706050" text-anchor="end">+0 pts</text>
<text x="230" y="448" font-family="sans-serif" font-size="11" fill="#A09878">Chips Remaining</text>
<text x="418" y="448" font-family="Georgia,serif" font-size="14" font-weight="bold" fill="#E6BF33" text-anchor="end">♦ 125</text>
<text x="230" y="468" font-family="sans-serif" font-size="11" fill="#A09878">Progress</text>
<text x="418" y="468" font-family="Georgia,serif" font-size="13" fill="#9E3030" text-anchor="end">156 / 400 ⚠</text>

<!-- ===== SCORE PROGRESS BAR (danger state) ===== -->
<rect x="16" y="514" width="400" height="32" rx="6" fill="#180808"/>
<rect x="16" y="514" width="400" height="32" rx="6" fill="none" stroke="#5A1818" stroke-width="1"/>
<rect x="18" y="516" width="154" height="28" rx="5" fill="#6A1818"/>
<rect x="18" y="516" width="154" height="28" rx="5" fill="none" stroke="#9E303050" stroke-width="1"/>
<text x="216" y="535" font-family="Georgia,serif" font-size="13" fill="#F0A0A0" text-anchor="middle">156 pts — 1 spin left — need 244 more!</text>

<!-- Warning indicator -->
<text x="416" y="527" font-family="sans-serif" font-size="10" fill="#9E1010">⚠</text>

<!-- ===== NEXT BET BUTTON ===== -->
<rect x="16" y="560" width="400" height="62" rx="8" fill="#E6BF33"/>
<rect x="18" y="562" width="396" height="58" rx="7" fill="none" stroke="#F0D86050" stroke-width="1.5"/>
<text x="216" y="599" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="#080604" text-anchor="middle" letter-spacing="4">NEXT BET →</text>

<!-- ===== LORE STRIP ===== -->
<rect x="0" y="636" width="432" height="30" fill="#180808"/>
<rect x="0" y="636" width="432" height="1" fill="#5A1818"/>
<text x="216" y="656" font-family="Georgia,serif" font-size="11" fill="#9E5050" text-anchor="middle" font-style="italic">"As expected. Pity."  — The Dealer</text>

<!-- Chip warning -->
<rect x="16" y="676" width="400" height="36" rx="6" fill="#2A1010"/>
<rect x="16" y="676" width="400" height="36" rx="6" fill="none" stroke="#9E101040" stroke-width="1"/>
<text x="216" y="693" font-family="sans-serif" font-size="11" fill="#CC4040" text-anchor="middle">⚠ Last spin — 244 pts still needed to clear the round</text>
<text x="216" y="707" font-family="sans-serif" font-size="10" fill="#9E3030" text-anchor="middle">Go big or go home. Bust chips = game over.</text>

<text x="216" y="742" font-family="sans-serif" font-size="11" fill="#706050" text-anchor="middle">1 spin remaining  ·  244 pts still needed</text>

<rect x="0" y="764" width="432" height="4" fill="#E6BF3828"/>
</svg>
